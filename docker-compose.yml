  version: '3.8'

  services:
    db:
      image: postgres:16
      container_name: tech-challenge-2-db
      restart: always
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: challenge
        POSTGRES_DB: tech_challenge_2_data
      ports:
        - "5433:5433"
      volumes:
        - postgres-data:/var/lib/postgresql/data

    app:
      build: .
      container_name: tech-challenge-2-java
      restart: always
      ports:
        - "8082:8082"
      depends_on:
        - db
      environment:
        SERVER_PORT: 8082
        SPRING_DATASOURCE_URL: jdbc:postgresql://db:5433/tech_challenge_2_data
        SPRING_DATASOURCE_USERNAME: postgres
        SPRING_DATASOURCE_PASSWORD: challenge

  volumes:
    postgres-data: